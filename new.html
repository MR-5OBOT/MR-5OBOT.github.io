<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>designer / &lt;coder&gt; — hero</title>
<style>
  :root {
    --ink: #333333;       /* headings */
    --grey: #757575;      /* body copy */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: #fff;
    color: var(--grey);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* three tracks: text gutter | face | text gutter.
     side text aligns toward the face, so any heading overflow runs inward, never off-screen */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(16px, 4vw, 72px);
    padding: 40px clamp(24px, 4vw, 72px);
  }

  .face { display: flex; justify-content: center; }
  .face-img {
    display: block;
    max-height: 78vh;
    max-width: 100%;
    width: auto;
    height: auto;
  }
  /* fallback box if the image is missing/corrupt */
  .face-fallback {
    display: none;
    width: min(420px, 60vw);
    aspect-ratio: 2 / 3;
    border: 2px dashed #ccc;
    color: #aaa;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 14px;
    padding: 16px;
  }
  .face.broken .face-img { display: none; }
  .face.broken .face-fallback { display: flex; }

  .designer { justify-self: end; }
  .coder    { justify-self: start; }
  .designer, .coder { transition: opacity .4s ease; }

  .designer h1, .coder h1 {
    margin: 0 0 .35em;
    color: var(--ink);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
    white-space: nowrap;
    font-size: clamp(40px, 5.4vw, 78px);
  }
  .designer p, .coder p {
    margin: 0;
    max-width: 290px;
    font-size: clamp(15px, 1.4vw, 18px);
    line-height: 1.45;
  }
  .designer a, .coder a { color: inherit; text-decoration: none; display: block; }

  /* hover cross-fade: focus one side, dim the other (CSS-only, no sprites) */
  .hero:has(.designer a:hover) .coder,
  .hero:has(.coder a:hover) .designer { opacity: .25; }

  /* Stack on small screens so the copy never collides with the face */
  @media (max-width: 860px) {
    .hero { grid-template-columns: 1fr; justify-items: center; gap: 28px; }
    .designer, .coder { justify-self: center; text-align: center; }
    .designer p, .coder p { margin: 0 auto; }
    .face { order: -1; }
  }
</style>
</head>
<body>

  <section class="hero">

    <div class="designer">
      <a href="#">
        <h1>designer</h1>
        <p>Product designer specialising in UI design and design systems.</p>
      </a>
    </div>

    <div class="face" id="face">
      <img class="face-img" src="assets/hero.png" alt="designer / coder split portrait"
           onerror="document.getElementById('face').classList.add('broken')">
      <div class="face-fallback">hero.png didn’t load — re-save a complete PNG to <code>assets/hero.png</code></div>
    </div>

    <div class="coder">
      <a href="#">
        <h1>&lt;coder&gt;</h1>
        <p>Front end developer who writes clean, elegant and efficient code.</p>
      </a>
    </div>

  </section>

</body>
</html>
