<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>designer / &lt;coder&gt; — hero</title>
<style>
  :root {
    --ink: #333333;       /* headings */
    --grey: #757575;      /* body copy */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: #fff;
    color: var(--grey);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    border-bottom: 1px solid #eee;
  }

  /* The face image sits centered; the two text columns float over the side margins */
  .face {
    position: relative;
    width: 100%;
    max-width: 1040px;
    display: flex;
    justify-content: center;
  }
  .face-img {
    display: block;
    max-height: 86vh;
    max-width: 100%;
    width: auto;
    height: auto;
  }
  /* fallback box shown if hero.png is missing/corrupt */
  .face-fallback {
    display: none;
    width: min(420px, 60vw);
    aspect-ratio: 2 / 3;
    border: 2px dashed #ccc;
    color: #aaa;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 14px;
    padding: 16px;
  }
  .face.broken .face-img { display: none; }
  .face.broken .face-fallback { display: flex; }

  .designer, .coder {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    max-width: 290px;
    z-index: 2;
    transition: opacity .4s ease;
  }
  .designer { left: 0; }
  .coder    { right: 0; }

  .designer h1, .coder h1 {
    margin: 0 0 .35em;
    color: var(--ink);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
    font-size: clamp(40px, 6.4vw, 82px);
  }
  .coder h1 .chev { color: var(--ink); }
  .designer p, .coder p {
    margin: 0;
    font-size: clamp(15px, 1.4vw, 18px);
    line-height: 1.45;
  }
  .designer a, .coder a { color: inherit; text-decoration: none; display: block; }

  /* hover cross-fade: focus one side, dim the other (CSS-only, no sprites) */
  .face:has(.designer a:hover) .coder,
  .face:has(.coder a:hover) .designer { opacity: .25; }

  /* Stack the copy on small screens so it never sits on top of the face */
  @media (max-width: 860px) {
    .hero { flex-direction: column; gap: 28px; }
    .designer, .coder {
      position: static;
      transform: none;
      max-width: 420px;
      text-align: center;
    }
    .designer p, .coder p { margin: 0 auto; }
    .face { order: -1; }
  }
</style>
</head>
<body>

  <section class="hero">

    <div class="designer">
      <a href="#">
        <h1>designer</h1>
        <p>Product designer specialising in UI design and design systems.</p>
      </a>
    </div>

    <div class="face" id="face">
      <img class="face-img" src="assets/hero.png" alt="designer / coder split portrait"
           onerror="document.getElementById('face').classList.add('broken')">
      <div class="face-fallback">hero.png didn’t load — re-save a complete PNG to <code>assets/hero.png</code></div>
    </div>

    <div class="coder">
      <a href="#">
        <h1><span class="chev">&lt;</span>coder<span class="chev">&gt;</span></h1>
        <p>Front end developer who writes clean, elegant and efficient code.</p>
      </a>
    </div>

  </section>

</body>
</html>
