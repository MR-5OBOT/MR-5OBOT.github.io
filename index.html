<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR5OBOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Merienda:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #000;
    color: #9a9a9a;
    font-family: "Space Grotesk", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Navbar with "selection box" corners — cloned from fsociety-website */
  .nav {
    position: fixed; top: 24px; left: 20px; right: 20px;
    max-width: 720px; margin: 0 auto; z-index: 50;
    background: #000; border: 1.5px solid #fff;
    padding: 18px 34px;
    display: flex; align-items: center; gap: 32px;
  }
  .nav .logo { font-family: 'Merienda', cursive; letter-spacing: .15em; font-size: 20px; margin-right: auto; color: #fff; }
  .nav a { color: #ddd; text-decoration: none; font-weight: 500; font-size: 20px; transition: color .2s; }
  .nav a:hover { color: #a280ea; filter: url(#pixelate); }   /* text breaks into soft pixels */
  .nav .corner { position: absolute; width: 8px; height: 8px; background: #000; border: 1.5px solid #fff; }
  .nav .tl { top: -5px; left: -5px; }  .nav .tr { top: -5px; right: -5px; }
  .nav .bl { bottom: -5px; left: -5px; } .nav .br { bottom: -5px; right: -5px; }

  /* Pixel-heatmap background, grey on black */
  #bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: .17; }

  /* Stage — full-screen hero, the image is the leader */
  .face {
    position: relative;
    width: 100vw;
    height: 100vh;
    margin: auto;
    overflow: hidden;
    z-index: 1;          /* sit above #bg */
  }
  /* top + bottom shadow: fade the hero into black at the edges */
  .face::after {
    content: "";
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
    background: linear-gradient(to bottom, #000 0%, transparent 20%, transparent 80%, #000 100%);
  }
  /* soft seam: frost the two halves together where they meet, hiding the slight misalignment.
     JS slides it to track the cursor wipe; 51.3% is the rest position for non-desktop. */
  .seam {
    position: absolute; top: 0; bottom: 0; left: 51.3%;
    width: 16px; transform: translateX(-50%);
    z-index: 2; pointer-events: none;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    -webkit-mask: linear-gradient(90deg, transparent, #000 35%, #000 65%, transparent);
            mask: linear-gradient(90deg, transparent, #000 35%, #000 65%, transparent);
  }

  /* Two halves of one image, clipped at the centre seam */
  .half {
    position: absolute;
    top: -16%;
    left: 24%;
    width: 52%;
    height: auto;
    z-index: 1;
    opacity: 0;
    filter: invert(1) hue-rotate(180deg);   /* dark mode: white bg -> black, paint colours kept */
    will-change: transform, clip-path;
    backface-visibility: hidden;
  }
  .half.left  { clip-path: inset(0 47.5% 0 0); transform: translateX(-120%); }
  .half.right { clip-path: inset(0 0 0 52.5%); transform: translateX(120%); }

  /* Load: slide in and assemble (easeOutExpo) */
  .face.loaded .half {
    opacity: 1;
    transform: translateX(0);
    transition: transform 1s cubic-bezier(.16,1,.3,1), opacity 1s ease;
  }
  /* drop the colourful (left) half a touch so the glasses line up with the line-art side */
  .face.loaded .half.left { transform: translateY(1.2%); }
  /* Once mouse-tracking takes over, JS drives transform every frame */
  .face.ready .half,
  .face.ready .desc { transition: none; }

  /* Flanking labels */
  .desc {
    position: absolute;
    top: 38%;
    width: 21%;
    z-index: 2;
    opacity: 0;
    transition: opacity .6s ease .9s;
    pointer-events: none;
  }
  .face.loaded .desc { opacity: 1; }
  .desc.left  { left: 1.5%; text-align: right; }   /* face the hero */
  .desc.right { right: 1.5%; text-align: left; }   /* face the hero */
  .desc h1 {
    margin: 0 0 .35em;
    white-space: nowrap;        /* keep the label on one line, like the reference */
    color: #ededed;
    font-weight: 700;
    font-size: clamp(22px, 2.7vw, 38px);
    line-height: 1.05;
    letter-spacing: -.03em;
  }
  .desc h1 .chev { color: #5a5a5a; }
  .desc p {
    margin: 0;
    font-size: clamp(14px, 1.55vw, 20px);
    line-height: 1.45;
  }
</style>
</head>
<body>

  <canvas id="bg"></canvas>

  <!-- Pixelate filter: sample 1 dot per cell, dilate into blocks, soften -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="pixelate" x="0" y="0" width="100%" height="100%">
      <feFlood x="1" y="1" width="1" height="1"/>
      <feComposite width="2" height="2"/>
      <feTile result="grid"/>
      <feComposite in="SourceGraphic" in2="grid" operator="in"/>
      <feMorphology operator="dilate" radius="0.7"/>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </svg>

  <nav class="nav">
    <a class="logo" href="/">MR5OBOT</a>
    <a href="#jankyard">Jankyard</a><a href="Knowledge.html">Knowledge</a><a href="#">Contact</a>
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
  </nav>

  <div class="face" id="face">
    <!-- ponytail: copy is placeholder, on-theme. Swap freely. -->
    <div class="desc left" id="descLeft">
      <h1>ohlc trader</h1>
      <p>Automates losing money so I can lose it in my sleep.</p>
    </div>
    <div class="desc right" id="descRight">
      <h1><span class="chev">&lt;</span>token burner<span class="chev">&gt;</span></h1>
      <p>Full of ideas no LLM can turn into working code.</p>
    </div>

    <img class="half left"  id="halfL" src="assets/hero-2-aligned.png" alt="">
    <img class="half right" id="halfR" src="assets/hero.png" alt="">
    <div class="seam" id="seam"></div>
  </div>

  <script>
    /* Pixel-heatmap: grid of grey cells, brightness from a slow blobby field. */
    (() => {
      const cv = document.getElementById('bg'), ctx = cv.getContext('2d');
      const CELL = 96, MAX = 90, GAP = 0;      // px size, top grey (0-255), black grout
      let cols, rows, grain, dpr;

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.ceil(innerWidth / CELL); rows = Math.ceil(innerHeight / CELL);
        grain = Float32Array.from({ length: cols * rows }, () => (Math.random() - 0.5) * 0.7);
      }

      function draw() {
        const cx = (cols - 1) / 2, cy = (rows - 1) / 2, maxd = Math.hypot(cx, cy);
        for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
          const xf = Math.min(x, cols - 1 - x);                 // fold across centre -> left/right mirror
          const n = Math.sin(xf * 0.4) + Math.sin(y * 0.35)
                  + Math.sin((xf + y) * 0.3) + Math.sin((xf - y) * 0.32);
          let v = 0.45 + grain[y * cols + xf] + (n / 4) * 0.25;   // per-tile random, gentle field bias
          v = Math.max(0, Math.min(1, v));
          const vig = 0.2 + 0.8 * (Math.hypot(x - cx, y - cy) / maxd);   // dark centre, bright edges
          const g = (v ** 1.3 * MAX * vig) | 0;
          ctx.fillStyle = `rgb(${g},${g},${g})`;
          ctx.fillRect(x * CELL, y * CELL, CELL - GAP, CELL - GAP);
        }
      }

      addEventListener('resize', () => { resize(); draw(); }); resize(); draw();
    })();

    const face = document.getElementById('face');
    const L = document.getElementById('halfL'), R = document.getElementById('halfR');
    const dL = document.getElementById('descLeft'), dR = document.getElementById('descRight');
    const seam = document.getElementById('seam');
    const REST = 0.525;           // seam at the middle man's nose
    const GAIN = 1;               // seam tracks the cursor 1:1 (no overshoot)
    const mq = matchMedia('(min-width: 1140px)');
    let imgL = 0, imgW = 1;       // cached image-box geometry
    let target, xp;              // seam px within the image box (damped)

    const measure = () => { const r = L.getBoundingClientRect(); imgL = r.left; imgW = r.width; };

    window.addEventListener('load', () => {
      requestAnimationFrame(() => face.classList.add('loaded'));
      if (!mq.matches) return;     // desktop showpiece only, like the original
      setTimeout(start, 1200);     // after the slide-in finishes
    });

    function start() {
      measure();
      target = xp = imgW * REST;
      face.classList.add('ready');
      addEventListener('resize', measure);
      // hover a side, keep that side: left reveals colour, right reveals line-art
      const SNAP = imgW * 0.05;   // close the wipe fully near the ends (no leftover sliver)
      face.addEventListener('mousemove', e => {
        const d = e.clientX - (imgL + imgW * REST);
        let t = Math.max(0, Math.min(imgW, imgW * REST - d * GAIN));
        if (t < SNAP) t = 0;
        else if (t > imgW - SNAP) t = imgW;
        target = t;
      });
      face.addEventListener('mouseleave', () => target = imgW * REST);
      loop();
    }

    function loop() {
      xp += (target - xp) / 12;    // zeno damping, same feel as the original
      if (Math.abs(target - xp) < 0.5) xp = target;   // settle exactly, no hairline
      L.style.clipPath = 'inset(0 ' + (imgW - xp) + 'px 0 0)';
      R.style.clipPath = 'inset(0 0 0 ' + xp + 'px)';
      seam.style.left = (imgL + xp) + 'px';   // frosted divider rides the wipe boundary
      const h = imgW / 2;          // labels brighten with the self being revealed
      dL.style.opacity = Math.min(1, xp / h);
      dR.style.opacity = Math.min(1, (imgW - xp) / h);
      requestAnimationFrame(loop);
    }
  </script>

</body>
</html>
