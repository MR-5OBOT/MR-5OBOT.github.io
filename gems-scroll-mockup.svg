    <text x="407" y="446" font-size="16" fill="#9a9a9a">we're not so different, the market and i.</text>

    <line x1="407" y1="478" x2="951" y2="478" stroke="#1f1f26" stroke-width="1"/>
    <text x="407" y="508" font-size="14" letter-spacing="1" fill="#b18cff">READ THE COPE &#8594;</text>
  </g>

  <!-- ===== older post (next): small + dim ===== -->
  <g opacity="0.4">
    <rect x="493" y="566" width="380" height="82" fill="#0c0c14" stroke="#262626"/>
    <rect x="509" y="580" width="4" height="52" fill="#b18cff"/>
    <text x="525" y="600" font-size="16" font-weight="700" fill="#ddd">let an LLM touch prod</text>
