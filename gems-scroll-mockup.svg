    <line x1="902" y1="702" x2="902" y2="748" stroke="#fff" stroke-width="1"/>
    <text x="243" y="730" text-anchor="middle" font-size="13" letter-spacing="1.5" fill="#9a9a9a">DEGEN OPERATOR</text>
