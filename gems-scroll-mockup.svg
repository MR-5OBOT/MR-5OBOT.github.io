  </g>

  <!-- scroll progress rail (sharp) -->
  <rect x="1341" y="110" width="3" height="540" fill="#1e1e1e"/>
  <rect x="1339" y="300" width="7" height="78" fill="#b18cff"/>

  <!-- ===== fixed bottom status bar ===== -->
  <g font-family="'Space Mono','Courier New',monospace">
