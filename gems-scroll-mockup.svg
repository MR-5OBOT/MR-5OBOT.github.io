  <text x="683" y="668" text-anchor="middle" font-size="11" letter-spacing="2" fill="#555">OLDER &#8595;</text>

  <!-- ===== newer post (scrolled past): small + dim ===== -->
  <g opacity="0.4">
    <rect x="533" y="116" width="300" height="82" fill="#0c0c14" stroke="#262626"/>
    <rect x="549" y="130" width="4" height="52" fill="#b18cff"/>
    <text x="567" y="150" font-size="16" font-weight="700" fill="#ddd">i rugged myself, on-chain</text>
    <text x="567" y="172" font-size="12" fill="#777">jun 28 &#183; 4 min</text>
  </g>

  <!-- ===== FOCAL post (viewport centre): full, bright, sharp ===== -->
  <g transform="rotate(-0.6 683 380)">
    <!-- sketch double-line frame: grey offset + white stroke, NO rounding -->
    <rect x="375" y="244" width="600" height="290" fill="none" stroke="#5a5a5a" stroke-width="2.5"/>
    <rect x="383" y="235" width="600" height="290" fill="#0c0c16" stroke="#fff" stroke-width="2.5"/>

    <text x="407" y="272" font-size="13" letter-spacing="2" fill="#b18cff">// LEAK 03</text>
    <text x="951" y="272" text-anchor="end" font-size="20" fill="#b18cff">&#8599;</text>

    <text x="407" y="322" font-size="32" font-weight="700" letter-spacing="-1" fill="#ededed">shorted my own stop-loss</text>
    <text x="407" y="350" font-size="13" letter-spacing="1.5" fill="#6f6f6f">JUN 26 &#183; 6 MIN &#183; PURE COPE</text>

    <text x="407" y="394" font-size="16" fill="#9a9a9a">wrote a bot to guard my position. it found the</text>
