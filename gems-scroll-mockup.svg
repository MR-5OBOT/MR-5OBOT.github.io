  <!-- ===== fixed top nav (unchanged) — Gems active ===== -->
  <g>
    <rect x="323" y="24" width="720" height="58" fill="#000" stroke="#fff" stroke-width="1.5"/>
    <text x="357" y="61" font-family="'Merienda',cursive" font-size="22" letter-spacing="3" fill="#fff">MR5OBOT</text>
    <text x="812" y="60" text-anchor="end" font-size="18" font-weight="500" fill="#dddddd">Jankyards</text>
    <text x="916" y="60" text-anchor="end" font-size="18" font-weight="500" fill="#b18cff">Gems</text>
    <text x="1009" y="60" text-anchor="end" font-size="18" font-weight="500" fill="#dddddd">Contact</text>
